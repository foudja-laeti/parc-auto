services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: parcauto
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: parcuser
      MYSQL_PASSWORD: parcpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend-auto
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend-auto:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=parcauto
      - DB_USER=parcuser
      - DB_PASSWORD=parcpass
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

volumes:
  mysql_data:
